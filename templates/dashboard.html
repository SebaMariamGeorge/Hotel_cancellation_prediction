<!DOCTYPE html>
<html>

<head>

    <title>Staff Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="top-bar">

    <h2>Staff Dashboard</h2>

    <a href="/">
        <button class="logout-btn">
            Logout
        </button>
    </a>

</div>

<div class="dashboard-container">

    <h1>
        Hotel Booking Analytics
    </h1>

    <table>

        <tr>

            <th>User ID</th>

            <th>Guest Name</th>

            <th>Room Number</th>

            <th>Cancellation Risk</th>

            <th>Overbooking Recommendation</th>

        </tr>

        {% for row in bookings %}

        <tr>

            <td>{{ row[0] }}</td>

            <td>{{ row[1] }}</td>

            <td>{{ row[2] }}</td>

            <td>{{ row[3] }}%</td>

            <td>{{ row[4] }}%</td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>

</html>
